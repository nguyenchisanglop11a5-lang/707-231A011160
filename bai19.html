<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài tập 19 - Memory Game</title>
  <style>
    /* CSS từ file style.css của bạn */
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; text-align: center; margin: 0; background: #f4f4f4; padding: 20px; }
    .game-board { 
        display: grid; grid-template-columns: repeat(4, 1fr); 
        gap: 10px; max-width: 400px; margin: 20px auto; 
    }
    @media (max-width: 600px) { .game-board { grid-template-columns: repeat(2, 1fr); } }
    .card { width: 100%; height: 100px; perspective: 1000px; cursor: pointer; }
    .card-inner { 
        width: 100%; height: 100%; position: relative; 
        transform-style: preserve-3d; transition: transform 0.5s; 
    }
    .card.flip .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back { 
        position: absolute; width: 100%; height: 100%; 
        border-radius: 8px; display: flex; justify-content: center; 
        align-items: center; backface-visibility: hidden; font-size: 2rem; 
    }
    .card-front { background: #333; color: white; }
    .card-back { background: #4CAF50; transform: rotateY(180deg); }
    .card:hover { transform: scale(1.05); }
    .back-nav { display: block; margin-top: 20px; text-decoration: none; color: #3498db; }
  </style>
</head>
<body>
  <header>
    <h1>Memory Matching Game</h1>
    <p>Số lượt: <span id="moves">0</span></p>
    <button id="reset">Chơi lại</button>
  </header>

  <main>
    <section class="game-board" id="gameBoard"></section>
  </main>

  <a href="index.html" class="back-nav">← Quay về Trang chủ</a>

  <script>
    /* JS từ file script.js của bạn */
    const symbols = ["🍎", "🍌", "🍇", "🍒"];
    let cards = [...symbols, ...symbols];
    const board = document.getElementById("gameBoard");
    const movesDisplay = document.getElementById("moves");
    const resetBtn = document.getElementById("reset");

    let firstCard = null, secondCard = null, lockBoard = false, moves = 0;

    function shuffle(array) { return array.sort(() => 0.5 - Math.random()); }

    function createBoard() {
      board.innerHTML = "";
      cards = shuffle(cards);
      cards.forEach(symbol => {
        const card = document.createElement("div");
        card.classList.add("card");
        card.innerHTML = `<div class="card-inner"><div class="card-front">?</div><div class="card-back">${symbol}</div></div>`;
        card.addEventListener("click", () => flipCard(card, symbol));
        board.appendChild(card);
      });
    }

    function flipCard(card, symbol) {
      if (lockBoard || card.classList.contains("flip")) return;
      card.classList.add("flip");
      if (!firstCard) { firstCard = { card, symbol }; return; }
      secondCard = { card, symbol };
      moves++;
      movesDisplay.textContent = moves;
      checkMatch();
    }

    function checkMatch() {
      if (firstCard.symbol === secondCard.symbol) { resetTurn(); checkWin(); } 
      else {
        lockBoard = true;
        setTimeout(() => {
          firstCard.card.classList.remove("flip");
          secondCard.card.classList.remove("flip");
          resetTurn();
        }, 800);
      }
    }

    function resetTurn() { [firstCard, secondCard] = [null, null]; lockBoard = false; }

    function checkWin() {
      const flipped = document.querySelectorAll(".card.flip");
      if (flipped.length === cards.length) {
        setTimeout(() => { alert(`🎉 Bạn thắng với ${moves} lượt!`); }, 300);
      }
    }

    resetBtn.addEventListener("click", () => {
      moves = 0; movesDisplay.textContent = 0;
      firstCard = null; secondCard = null;
      createBoard();
    });

    createBoard();
  </script>
</body>
</html>
